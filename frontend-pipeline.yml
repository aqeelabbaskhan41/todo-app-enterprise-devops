trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  REACT_APP_API_BASE_URL: $(REACT_APP_API_BASE_URL)

stages:

# ---------------- BUILD ----------------
- stage: Build
  displayName: Build React App
  jobs:
    - job: BuildJob
      steps:
        - task: NodeTool@0
          inputs:
            versionSpec: '18.x'
          displayName: Install Node.js

        - script: |
            cd frontend
            npm install
            npm run build
          displayName: Build React App
          env:
            REACT_APP_API_BASE_URL: $(REACT_APP_API_BASE_URL)

        - task: PublishBuildArtifacts@1
          inputs:
            pathToPublish: 'frontend/build'
            artifactName: 'frontend-build'

# ---------------- DEPLOY ----------------
- stage: Deploy
  displayName: Deploy to Static Web App
  dependsOn: Build
  jobs:
    - job: DeployJob
      steps:
        - download: current
          artifact: frontend-build

        # IMPORTANT FIX HERE
        - task: AzureStaticWebApp@0
          inputs:
            app_location: "frontend/build"
            skip_app_build: true
            azure_static_web_apps_api_token: $(AZURE_STATIC_WEBAPP_TOKEN)
          displayName: Deploy to SWA