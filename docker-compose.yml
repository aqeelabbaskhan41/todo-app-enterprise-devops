version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: todo-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TOKEN_KEY=localtestingsecretkey123456789abc
      # Point to your LOCAL postgres — host.docker.internal resolves to your Windows host
      - DATABASE_URL=postgresql://postgres:90931916@host.docker.internal:5432/todoapp?schema=public
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_BASE_URL=http://localhost:8080/api
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
